<!DOCTYPE html>
<html>
<head>
    <title>NEXORA AI</title>

    <style>
        body{
            background-color:#0B1F3A;
            color:white;
            font-family:Arial, sans-serif;
            text-align:center;
            padding:40px;
        }

        h1{
            color:#7B2CBF;
        }

        button{
            background:#7B2CBF;
            color:white;
            border:none;
            padding:15px 30px;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#5A189A;
        }

        #output{
            margin-top:30px;
            padding:20px;
            border:2px solid #7B2CBF;
            border-radius:10px;
            background:#13294B;
        }
    </style>
</head>

<body>

<h1>NEXORA AI</h1>

<h2>Na samu mafita. Na samu malami.</h2>

<p><strong>Founder:</strong> Yahaya Bello</p>

<p><strong>Country:</strong> Nigeria</p>

<p><strong>Mission:</strong> To help people learn, solve problems, and build skills.</p>

<button onclick="startNexora()">Start NEXORA AI</button>

<div id="output">
    <p>Danna <b>Start NEXORA AI</b> domin fara tattaunawa.</p>
</div>

<script>

function startNexora(){

    let name = prompt("Menene sunanka?");
    let goal = prompt("Menene burinka?");

    document.getElementById("output").innerHTML = `
        <h2>Assalamu Alaikum, ${name}.</h2>

        <p><strong>Burinka:</strong> ${goal}</p>

        <p>NEXORA AI za ta taimaka maka ka cimma burinka.</p>

        <h3>Na samu mafita.</h3>

        <h3>Na samu malami.</h3>
    `;

}

</script>

</body>
</html>
